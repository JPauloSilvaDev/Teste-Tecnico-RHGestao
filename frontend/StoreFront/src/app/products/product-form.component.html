<div class="page-head">
  <div class="page-head__text">
    <h1 class="page-title">{{ isEdit ? 'Editar produto' : 'Novo Produto' }}</h1>
    <p class="page-subtitle">{{ isEdit ? 'Altere os dados do produto' : 'Cadastre um novo produto no catálogo' }}</p>
  </div>
  <a routerLink="/products" class="btn-back">Voltar</a>
</div>

<form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-card">
  <div class="form-group">
    <label for="name">Nome</label>
    <input id="name" type="text" formControlName="name" placeholder="Nome do produto" />
    <span class="error" *ngIf="form.get('name')?.touched && form.get('name')?.errors?.['required']">Obrigatório.</span>
  </div>
  <div class="form-group">
    <label for="description">Descrição</label>
    <textarea
      id="description"
      formControlName="description"
      rows="3"
      placeholder="Breve descrição do produto"
    ></textarea>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label for="price">Preço (R$)</label>
      <input id="price" type="number" formControlName="price" min="0" step="0.01" />
      <span class="error" *ngIf="form.get('price')?.touched && form.get('price')?.invalid">Valor inválido.</span>
    </div>
    <div class="form-group">
      <label for="quantityInStock">Estoque</label>
      <input id="quantityInStock" type="number" formControlName="quantityInStock" min="0" />
      <span class="error" *ngIf="form.get('quantityInStock')?.touched && form.get('quantityInStock')?.invalid">Valor inválido.</span>
    </div>
  </div>
  <div class="form-actions">
    <button type="submit" class="btn-primary" [disabled]="form.invalid || submitting">
      {{ submitting ? 'Salvando...' : (isEdit ? 'Salvar alterações' : 'Cadastrar produto') }}
    </button>
    <a routerLink="/products" class="btn-cancel" [class.disabled]="submitting">Cancelar</a>
  </div>
</form>
